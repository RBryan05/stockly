<div class="container-fluid px-4 mt-4">


    <div class="row mb-3 align-items-center">
        <div class="col">
            <h3 class="fw-bold">
                <i class="bi bi-tag me-2"></i>Categorías
            </h3>
            <p class="text-muted mb-0">Administra las categorías de los productos.</p>
        </div>
        <div class="col-auto">
            <button class="btn btn-success">
                <i class="bi bi-plus-lg me-1"></i>Nueva Categoría
            </button>
        </div>
    </div>


    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th class="text-center">Productos</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    @for (categoria of categorias; track categoria.id) {
                    <tr>
                        <td><span class="fw-semibold text-muted">{{ categoria.codigo }}</span></td>
                        <td class="fw-semibold">{{ categoria.nombre }}</td>
                        <td class="text-muted">{{ categoria.descripcion }}</td>
                        <td class="text-center">
                            <span class="badge bg-primary rounded-pill fs-6 px-3">
                                {{ categoria.totalProductos }}
                            </span>
                        </td>
                        <td>
                            <span class="badge" [class.bg-success]="categoria.estado === 'Activo'"
                                [class.bg-secondary]="categoria.estado === 'Inactivo'">
                                {{ categoria.estado }}
                            </span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" (click)="eliminarCategoria(categoria.id)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>


</div>
